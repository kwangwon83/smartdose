<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#F8FAFC"/>
  <!-- Medicine bottle -->
  <rect x="70" y="60" width="60" height="80" rx="8" fill="#E2E8F0"/>
  <rect x="80" y="50" width="40" height="12" rx="4" fill="#CBD5E1"/>
  <!-- Cross on bottle -->
  <rect x="93" y="80" width="14" height="4" rx="1" fill="#94A3B8"/>
  <rect x="98" y="75" width="4" height="14" rx="1" fill="#94A3B8"/>
  <!-- Pills scattered -->
  <ellipse cx="55" cy="130" rx="8" ry="5" fill="#CBD5E1" transform="rotate(-20 55 130)"/>
  <ellipse cx="145" cy="140" rx="8" ry="5" fill="#CBD5E1" transform="rotate(15 145 140)"/>
  <ellipse cx="155" cy="100" rx="6" ry="4" fill="#CBD5E1" transform="rotate(30 155 100)"/>
  <!-- Soft pattern -->
  <circle cx="40" cy="60" r="12" fill="#5EEAD4" opacity="0.1"/>
  <circle cx="160" cy="70" r="10" fill="#FDBA74" opacity="0.1"/>
  <!-- Dashed line suggesting emptiness -->
  <path d="M60 160 Q100 175 140 160" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
</svg>